# Serviço Railway dedicado webhooks WhatsApp. Não usar no serviço web.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile.webhook"

[deploy]
startCommand = "python manage.py migrate --noinput && python manage.py run_webhook_worker"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
